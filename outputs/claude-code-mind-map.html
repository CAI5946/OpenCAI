<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Code 思维导图</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1f2933;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid #deded8;
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .note {
      margin-top: 4px;
      font-size: 12px;
      color: #62707f;
    }
    #mindmap {
      width: 100vw;
      height: calc(100vh - 58px);
      background: #fbfbf8;
    }
  </style>
</head>
<body>
  <header>
    <h1>Claude Code 思维导图</h1>
    <div class="note">基于当前仓库 README、docs/core-loop-architecture.md、docs/roadmap.md 和 claude-code/src 目录结构生成；使用 CDN 加载 Markmap，需联网。</div>
  </header>
  <svg id="mindmap"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib"></script>
  <script>
    const markdown = "# Claude Code\n\n## 定位\n\n### 终端 Coding Agent\n- 面向软件工程任务\n- 能读文件、改代码、跑命令、搜索代码库\n- 通过工具把模型连接到真实环境\n\n### 研究样本\n- 当前仓库是源码快照研究材料\n- 目标是理解现代 Agent CLI 架构\n- 不应作为个人 Agent 的直接复刻目标\n\n### 技术栈\n- TypeScript strict\n- Bun runtime\n- React + Ink 终端 UI\n- Commander.js CLI 解析\n- Zod schema 校验\n- ripgrep 代码搜索\n- Anthropic SDK、MCP、LSP\n\n## 核心闭环\n\n### 用户请求\n- 输入目标、边界、线索、验证方式\n- 工作目录和规则文件会影响后续判断\n\n### 构建上下文\n- 系统上下文：平台、日期、cwd、工具说明\n- 用户上下文：项目规则、记忆、额外目录\n- 动态上下文：读到的文件、命令输出、工具结果\n\n### Query 循环\n- 发送 messages + tools 给模型\n- 接收普通文本或 tool_use\n- 工具结果作为 observation 写回消息\n- 继续推理、修改、验证直到完成或中止\n\n### 工具执行\n- 校验工具名和输入 schema\n- 经过权限判断\n- 执行真实文件、shell、搜索、网络或 MCP 操作\n\n### 验证反馈\n- 测试、构建、lint、typecheck、diff、运行结果\n- 失败日志回到模型，驱动下一轮修复\n\n## 关键模块\n\n### QueryEngine.ts\n- 会话控制器\n- 保存消息历史、缓存、用量、权限拒绝记录\n- submitMessage 启动用户回合\n- 持续产出 streaming message\n\n### query.ts\n- 真正的 ReAct 运行循环\n- 规范化 API 请求\n- 处理 streaming 响应\n- 识别 tool_use 和 tool_result\n- 管 token 预算、compact、重试、错误恢复\n\n### context.ts\n- 上下文操作系统\n- getSystemContext / getUserContext\n- 读取项目规则和 memory\n- 控制模型知道什么、遵守什么\n\n### Tool.ts / tools.ts\n- 统一工具接口和注册中心\n- name、inputSchema、call、prompt、validateInput\n- checkPermissions、isReadOnly、isDestructive、isConcurrencySafe\n\n### main.tsx / commands.ts\n- CLI 入口与 slash command 注册\n- Commander.js 路径\n- React/Ink renderer 初始化\n- 启动阶段并行预取设置和认证信息\n\n## 工具体系\n\n### 文件与搜索\n- FileReadTool：读取文本、图片、PDF、notebook\n- FileWriteTool：创建或覆盖文件\n- FileEditTool：局部字符串替换\n- GlobTool：文件模式匹配\n- GrepTool：ripgrep 内容搜索\n\n### 执行与验证\n- BashTool：shell 命令执行\n- LSPTool：语言服务能力\n- NotebookEditTool：notebook 修改\n- SyntheticOutputTool：结构化输出\n\n### 网络与外部系统\n- WebFetchTool：抓取 URL 内容\n- WebSearchTool：网络搜索\n- MCPTool：调用 MCP server 工具\n- ListMcpResources / ReadMcpResource：MCP 资源访问\n\n### Agent 协作\n- AgentTool：生成子 Agent\n- TaskCreate / TaskGet：任务管理\n- TeamCreate / TeamDelete：团队 Agent\n- SendMessage：Agent 间消息\n\n### 模式控制\n- EnterPlanMode / ExitPlanMode\n- EnterWorktree / ExitWorktree\n- ToolSearch：延迟工具发现\n- Cron / RemoteTrigger / Sleep：触发和等待\n\n## 命令系统\n\n### Git 与代码流\n- /commit：创建提交\n- /review：代码审查\n- /diff：查看变更\n- /pr_comments：查看 PR 评论\n- /branch：分支相关操作\n\n### 会话与上下文\n- /compact：上下文压缩\n- /resume：恢复会话\n- /context：上下文可视化\n- /memory：持久记忆管理\n- /clear：清理会话或缓存\n\n### 配置与诊断\n- /config：设置管理\n- /doctor：环境诊断\n- /login / /logout：认证\n- /cost：用量成本\n- /status：当前状态\n\n### 扩展能力\n- /mcp：MCP 管理\n- /skills：skill 管理\n- /plugin：插件管理\n- /agents：agent 管理\n- /tasks：任务管理\n\n### 交互体验\n- /vim：Vim 模式\n- /theme：主题\n- /keybindings：快捷键\n- /desktop / /mobile：跨端衔接\n\n## 权限与安全\n\n### 权限目标\n- 分离模型意图和系统执行\n- 工具执行前做校验与授权\n- 防止模型直接变成无限制执行器\n\n### 检查维度\n- 输入是否合法\n- 工具是否启用\n- 操作是否只读\n- 是否修改、删除或执行危险命令\n- 当前 permission mode 是否允许自动执行\n\n### Bash 风险识别\n- 区分 rg、cat、ls 等读操作\n- 识别 rm、mv、chmod 等高风险操作\n- PowerShell、sandbox、文件权限有专门 UI\n\n### 用户启示\n- 先读、先搜、先计划更稳\n- 高风险命令应显式确认\n- 好的 Agent 应解释风险，而不是绕过权限\n\n## 扩展系统\n\n### Skills\n- 复用工作流单元\n- SkillTool 负责执行\n- 支持用户自定义 skill\n- 适合沉淀可重复流程\n\n### Plugins\n- 内置和第三方插件加载\n- marketplace / manage / validate / settings\n- 扩展命令、工具或工作流能力\n\n### MCP\n- 外部工具和资源协议\n- 管 server、tool、resource、auth\n- 把本地/远程能力暴露给 Agent\n\n### LSP\n- 符号、诊断、代码理解\n- 比纯文本搜索更结构化\n- 适合代码定位和编辑辅助\n\n### Bridge / Remote\n- 连接 IDE、远程会话和控制通道\n- VS Code / JetBrains 方向\n- WebSocket、direct connect、permission bridge\n\n## 工程模式\n\n### Parallel Prefetch\n- 启动阶段并行读取 MDM 设置、keychain、API preconnect\n- 目标是降低 CLI 冷启动等待\n\n### Lazy Loading\n- 重模块延迟 import\n- feature gated 子系统按需加载\n- 减少默认路径成本\n\n### Feature Flags\n- Bun bundle feature 控制代码路径\n- VOICE_MODE、BRIDGE_MODE、DAEMON、PROACTIVE 等\n- 未启用路径可被构建期剥离\n\n### Streaming UI\n- React + Ink 渲染终端界面\n- streaming message 逐步显示\n- screens、components、hooks 分层\n\n### State 与 Memory\n- state 管 UI 和会话状态\n- memdir / SessionMemory 管记忆\n- teamMemorySync 支持团队记忆同步\n\n## 学习路线\n\n### 第一阶段：核心循环\n- 用户目标如何进入系统\n- Agent 如何找上下文\n- 如何选工具、改文件、验证\n- 失败后如何继续迭代\n\n### 第二阶段：上下文系统\n- 规则文件如何影响行为\n- 大项目上下文不足如何处理\n- 什么时候需要用户补充信息\n\n### 第三阶段：工具与权限\n- 读、搜、执行 shell 的边界\n- 修改前的确认和风险判断\n- 如何保护用户已有改动\n\n### 第四阶段：个人 Agent MVP\n- Session(messages, cwd)\n- ContextBuilder\n- LLMClient\n- ToolRouter\n- PermissionGuard\n- ToolExecutor\n- Verifier\n\n### 暂不优先\n- 多 Agent 协作\n- 插件市场\n- 复杂 UI\n- 长期记忆自动同步\n- 远程会话\n\n## 一句话\n- Claude Code 的核心不是模型会写代码\n- 而是上下文约束、工具执行、权限控制、验证反馈组成的工程闭环\n";
    const transformer = new markmap.Transformer();
    const { root } = transformer.transform(markdown);
    markmap.Markmap.create("#mindmap", {
      autoFit: true,
      duration: 250,
      initialExpandLevel: 2,
      maxWidth: 260,
      spacingHorizontal: 80,
      spacingVertical: 10
    }, root);
  </script>
</body>
</html>
