<html lang="zh-CN">

    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1f2933;
    }
    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid #deded8;
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .note {
      margin-top: 4px;
      font-size: 12px;
      color: #62707f;
    }
    main {
      min-height: 0;
      overflow: auto;
      background: #fbfbf8;
      padding: 24px;
    }
    .mermaid {
      min-width: 720px;
      width: max-content;
      max-width: none;
      margin: 0 auto;
    }
  </style>
</head>
