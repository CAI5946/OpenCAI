      background: #ffffff;
    }

      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .note {

      font-size: 12px;
      color: #62707f;
    }
    #mindmap {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #fbfbf8;
    }
  </style>
