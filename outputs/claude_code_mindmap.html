<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Code / Coding Agent 架构与学习路线</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1f2933;
    }
    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid #deded8;
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .note {
      margin-top: 4px;
      font-size: 12px;
      color: #62707f;
    }
    #mindmap {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #fbfbf8;
    }
  </style>
</head>
<body>
  <header>
    <h1>Claude Code / Coding Agent 架构与学习路线</h1>
    <div class="note">基于项目 core-loop-architecture.md、roadmap.md 和 minimal-coding-agent-loop-design.md 生成的思维导图。</div>
  </header>
  <svg id="mindmap"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib"></script>
  <script>
    const markdown = "# Claude Code / Coding Agent 架构与路线\n## 1. 核心闭环原理\n### 状态机流转\n- 用户请求输入\n- 上下文拼装\n- LLM 推理决策\n- 本地工具执行\n- 观察结果返回\n- 循环验证直至完成\n### 核心理念\n- 上下文约束模型\n- 工具连接真实环境\n- 权限控制执行风险\n- 验证驱动迭代行动\n## 2. 会话与上下文系统\n### 会话引擎 (QueryEngine)\n- 保存消息历史\n- 缓存读取文件\n- 用量与权限记录\n- 启动/控制会话回合\n### 上下文系统 (Context)\n- 系统上下文 (环境/工具)\n- 用户上下文 (项目规则/记忆)\n- 动态上下文 (运行输出/文件)\n- 分层加载与缓存机制\n## 3. 运行循环 (Query Loop)\n### 状态迭代 (query.ts)\n- 消息规范化为 API 请求\n- 识别 `tool_use` 申请\n- 调度工具并执行\n- 组装 `tool_result` 反馈\n### 工程挑战\n- Token 预算限制\n- 消息压缩与 Compact\n- 错误恢复与重试机制\n## 4. 工具与权限系统\n### 工具接口 (Tool.ts)\n- Zod/JSON Schema 输入约束\n- 描述信息与 Prompt 引导\n- 读写风险等级定义\n- 并发安全校验\n### 核心工具集\n- `read_file` (文件读取)\n- `search_files` (ripgrep 搜索)\n- `apply_patch` (精确代码修改)\n- `run_command` (验证命令执行)\n### 权限网关 (PermissionGuard)\n- 读写操作安全区分\n- 敏感/写操作用户二次确认\n- 沙箱路径边界校验\n- 危险命令硬拦截\n## 5. 验证闭环 (Verifier)\n### 验证方式\n- 自动化测试命令\n- 编译/构建检查\n- Lint/类型静态检查\n- 代码 Diff 预览审计\n### 错误反馈循环\n- 验证失败 stdout/stderr\n- 压缩输出喂回模型\n- 模型基于报错继续迭代\n## 6. MVP 极简实现路线\n### 阶段 0~1：骨架与最小循环\n- 阶段 0: Terminal 模拟事件流渲染\n- 阶段 1: Gemini 最小工具调用循环\n### 阶段 2~4：安全/上下文/编辑\n- 阶段 2: 项目规则加载与沙箱\n- 阶段 3: 文件树与上下文精简\n- 阶段 4: 补丁验证与二次确认\n### 阶段 5~8：权限/优化/高级\n- 阶段 5: 读写分离权限细化\n- 阶段 6: 交互式 CLI 及状态指令\n- 阶段 7: 多 Provider 与 MCP 插件\n- 阶段 8: 多 Agent 协作与工作区隔离\n## 7. 实践原则与规避风险\n### 核心原则\n- KISS 原则，非必要不引入复杂 UI\n- 先闭环、后扩展，注重单体稳定性\n- 可读、显式的代码胜过过度抽象\n### 关键风险\n- 过度设计，盲目复刻复杂特性\n- 模型工具调用参数混乱或漏用\n- 本地执行越界导致文件损毁\n";
    const transformer = new markmap.Transformer();
    const { root } = transformer.transform(markdown);
    markmap.Markmap.create("#mindmap", {
      autoFit: true,
      duration: 250,
      initialExpandLevel: 2,
      fitRatio: 0.92,
      maxInitialScale: 1.2,
      maxWidth: 260,
      paddingX: 10,
      spacingHorizontal: 80,
      spacingVertical: 10
    }, root);
  </script>
</body>
</html>
